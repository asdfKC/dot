font_family JetBrainsMono Nerd Font
font_size 12.5

background #0b0614
foreground #efe7ff
window_padding_width 10

cursor #b86bff
cursor_shape beam
cursor_blink_interval 0.6

selection_foreground #0b0614
selection_background #b88cff

color0 #141021
color8 #3a2b52
color1 #ff5fd7
color2 #6ee7b7
color3 #b88cff
color4 #7aa2f7
color5 #d39bff
color6 #22d3ee
color7 #f5edff

enable_audio_bell no
visual_bell_duration 0.0
repaint_delay 8
sync_to_monitor yes
linux_display_server wayland

scrollback_lines 10000

tab_bar_style powerline
tab_bar_edge bottom
tab_bar_min_tabs 1
font_size 14

background_opacity 0.82
dynamic_background_opacity yes
