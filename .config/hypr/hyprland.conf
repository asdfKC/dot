################
### MONITORS ###
################

monitor = DP-4, 2560x1440@164.833, 0x0, 1
monitor = HDMI-A-1, 1366x768@59.79, 2560x0, 1


################
### PROGRAMS ###
################

$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = bash -lc 'pgrep -x kded6 >/dev/null || kded6; for i in 1 2 3 4 5; do qdbus6 org.kde.kded6 /kded org.kde.kded6.loadModule statusnotifierwatcher >/dev/null 2>&1 && break; sleep 1; done'
exec-once = mpvpaper -o "no-audio loop" DP-4 ~/Wallpapers/live.mp4
exec-once = mpvpaper -o "no-audio loop" HDMI-A-1 ~/Wallpapers/live.mp4
exec-once = hypridle
exec-once = swaync
exec-once = sleep 1 && hyprctl keyword general:gaps_out 22
exec-once = systemctl --user restart xdg-desktop-portal-hyprland
exec-once = hyprctl dispatch workspace $(cat /tmp/hypr_prev_workspace 2>/dev/null || echo 1)
exec-once = rclone mount gdrive: ~/GoogleDrive --daemon --vfs-cache-mode full --vfs-cache-max-size 2G --dir-cache-time 72h --poll-interval 15s
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

###################
### LOOK & FEEL ###
###################

general {
    gaps_in = 8
    gaps_out = 22
    border_size = 2

    col.active_border = 0xffb45aff
    col.inactive_border = 0xff2a1a3b

    layout = dwindle
}

decoration {
    rounding = 12

    shadow {
        enabled = true
        range = 6
        color = rgba(0, 0, 0, 0.6)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

animations {
    enabled = yes

    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = smoothOut, 0.36, 0.0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1.0, 0.5, 1.0
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 6, overshot, slide
    animation = windowsOut, 1, 5, smoothIn, popin 82%
    animation = border, 1, 10, default
    animation = borderangle, 1, 20, linear, loop
    animation = fade, 1, 6, smoothOut
    animation = layers, 1, 5, smoothOut, slide
    animation = workspaces, 1, 7, overshot, slidefade 18%
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
}


####################
### WORKSPACE MAP ###
####################

workspace = 1, monitor:DP-4
workspace = 2, monitor:DP-4
workspace = 3, monitor:DP-4
workspace = 4, monitor:DP-4
workspace = 5, monitor:DP-4
workspace = 6, monitor:DP-4
workspace = 7, monitor:DP-4
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:HDMI-A-1


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating
bind = $mainMod, W, exec, google-chrome-stable
bind = $mainMod, ESCAPE, exec, missioncenter
bind = $mainMod, C, exec, sh -c 'webcord & zapzap & slack & gvoice & gmessages &'
bind = $mainMod, L, exec, ~/.config/hypr/scripts/lock.sh
bind = SUPER, R, exec, ~/.config/hypr/scripts/restart_desktop.sh
bindr = $mainMod, SUPER_L, exec, $menu
bind = $mainMod, B, exec, blueman-manager
bind = $mainMod, S, exec, ~/.config/hypr/scripts/screenshot_noanim.sh region
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot_noanim.sh region
bind = , PRINT, exec, ~/.config/hypr/scripts/screenshot_noanim.sh full
bind = SHIFT, PRINT, exec, ~/.config/hypr/scripts/screenshot_noanim.sh region
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 2%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 2%-
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, n, exec, swaync-client -t


env = WLR_RENDERER,pixman

# HyprEmoji config
source = ~/.config/hypremoji/hypremoji.conf

# Polkit Agent for GUI Authentication
